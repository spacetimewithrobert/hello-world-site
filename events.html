<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Events | SpaceTime With Robert</title>
<meta name="description" content="Upcoming SpaceTime With Robert telescope outreach events, schedule updates, and locations.">
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- GLOBAL HEADER -->
<div id="site-header"></div>

<main class="page">

    <section class="container">

        <!-- EVENT STATUS -->
        <section class="event-status">

            <figure id="eventContainer" class="event-container">

                <img
                    id="eventImage"
                    src="images/logo.jpg"
                    alt="SpaceTime With Robert logo"
                    class="event-image"
                >

                <div id="eventOverlayText" class="event-overlay"></div>
                <div id="eventOverlayLocation" class="event-overlay"></div>

                <div id="goStatusText" class="statusText goText">GO</div>
                <div id="pendingStatusText" class="statusText pendingText">PENDING</div>
                <div id="noGoStatusText" class="statusText noGoText">NO GO</div>

            </figure>

        </section>

        <!-- CALENDAR -->
        <section class="calendar-section">

            <div class="calendar-container">
                <div id="calendar" class="calendar"></div>
            </div>

        </section>

    </section>

</main>

<!-- POPUP SYSTEM -->
<div id="overlay" class="overlay" onclick="closePopup()"></div>

<div id="popup" class="popup" role="dialog" aria-modal="true">
    <div id="popup-content"></div>
    <button class="popup-close-btn" onclick="closePopup()">Close</button>
</div>

<!-- EVENT DATA -->
<script id="event-data" type="application/json">
{
  "260503": {
    "description": "SPACETIME! (PENDING)",
    "startTime": "18:00",
    "endTime": "21:00",
    "location": {
      "lat": 48.754048,
      "lon": -122.50088
    }
  }
}
</script>

<script>
const SETTINGS = {
    switchTime: 12,
    overrideGo: false,
    eventDay: 0
};

function getEvents() {
    return JSON.parse(document.getElementById("event-data").textContent);
}

function openPopup(content) {
    document.getElementById("popup-content").innerHTML = content;
    document.getElementById("popup").style.display = "block";
    document.getElementById("overlay").style.display = "block";
}

function closePopup() {
    document.getElementById("popup").style.display = "none";
    document.getElementById("overlay").style.display = "none";
}

function updateEventStatus() {
    const img = document.getElementById("eventImage");
    const go = document.getElementById("goStatusText");
    const pending = document.getElementById("pendingStatusText");
    const noGo = document.getElementById("noGoStatusText");

    const now = new Date();
    const isEventDay = now.getDay() === SETTINGS.eventDay;
    const afterSwitch = now.getHours() >= SETTINGS.switchTime;

    // reset state
    go.style.display = "none";
    pending.style.display = "none";
    noGo.style.display = "none";

    img.classList.remove("grayscale", "red-tint");

    if (SETTINGS.overrideGo && isEventDay) {
        go.style.display = "block";
        return;
    }

    if (isEventDay && afterSwitch) {
        img.classList.add("red-tint");
        noGo.style.display = "block";
        return;
    }

    img.classList.add("grayscale");
    pending.style.display = "block";
}

function createCalendar() {
    const calendar = document.getElementById("calendar");
    calendar.innerHTML = "";

    const events = getEvents();

    const now = new Date();
    const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());

    const startDate = new Date(today);
    startDate.setDate(today.getDate() - today.getDay());

    for (let i = 0; i < 28; i++) {
        const date = new Date(startDate);
        date.setDate(startDate.getDate() + i);

        const key =
            String(date.getFullYear()).slice(2) +
            String(date.getMonth() + 1).padStart(2, "0") +
            String(date.getDate()).padStart(2, "0");

        const day = document.createElement("div");
        day.className = "day";
        day.innerHTML = `<strong>${date.getDate()}</strong>`;

        if (events[key]) {
            const event = events[key];

            day.classList.add("has-event");

            day.onclick = () => {
                openPopup(`
                    <h3>${date.toDateString()}</h3>
                    <p>${event.description}</p>
                    <p><strong>${event.startTime} - ${event.endTime}</strong></p>
                    <p>
                        <a href="https://www.google.com/maps?q=${event.location.lat},${event.location.lon}" target="_blank">
                            View Location
                        </a>
                    </p>
                `);
            };
        }

        calendar.appendChild(day);
    }
}

document.addEventListener("DOMContentLoaded", () => {
    updateEventStatus();
    createCalendar();
});
</script>

<!-- GLOBAL HEADER SCRIPT (ONLY ONCE) -->
<script src="header.js"></script>

</body>
</html>
