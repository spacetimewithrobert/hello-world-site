<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Events | SpaceTime With Robert</title>
<meta name="description" content="Upcoming SpaceTime With Robert telescope outreach events, schedule updates, and event locations.">
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="site-header">
    <h1>SpaceTime With Robert</h1>
</header>

<main class="events-page">

    <!-- EVENT STATUS -->
    <section class="event-status-section">
        <figure id="eventContainer" class="event-container">
            <img
                id="eventImage"
                src="images/logo.jpg"
                alt="SpaceTime With Robert logo"
                class="event-image"
            >

            <figcaption id="eventOverlayText" class="event-overlay"></figcaption>
            <div id="eventOverlayLocation" class="event-overlay"></div>

            <div id="goStatusText" class="statusText goText">GO</div>
            <div id="pendingStatusText" class="statusText pendingText">PENDING</div>
            <div id="noGoStatusText" class="statusText noGoText">NO GO</div>
        </figure>
    </section>

    <!-- CALENDAR -->
    <section class="calendar-section">
        <div class="calendar-container">
            <div id="calendar" class="calendar"></div>
        </div>
    </section>

</main>

<!-- POPUP -->
<div id="overlay" class="overlay" onclick="closePopup()"></div>

<div id="popup" class="popup" role="dialog" aria-modal="true" aria-labelledby="popup-title">
    <div id="popup-content"></div>
    <button class="popup-close-btn" onclick="closePopup()">Close</button>
</div>

<!-- EVENT DATA -->
<script id="event-data" type="application/json">
{
  "260503": {
    "description": "SPACETIME! (PENDING)",
    "startTime": "18:00",
    "endTime": "21:00",
    "location": {
      "lat": 48.754048,
      "lon": -122.50088
    }
  }
}
</script>

<script>
const SETTINGS = {
    switchTime: 12,
    overrideGo: false,
    eventDay: 0
};

function getEvents() {
    const raw = document.getElementById("event-data").textContent;
    return JSON.parse(raw);
}

function hideStatusText() {
    document.getElementById("goStatusText").style.display = "none";
    document.getElementById("pendingStatusText").style.display = "none";
    document.getElementById("noGoStatusText").style.display = "none";
}

function resetImageClasses() {
    const img = document.getElementById("eventImage");
    img.classList.remove("grayscale", "red-tint");
}

function openPopup(content) {
    document.getElementById("popup-content").innerHTML = content;
    document.getElementById("popup").style.display = "block";
    document.getElementById("overlay").style.display = "block";
}

function closePopup() {
    document.getElementById("popup").style.display = "none";
    document.getElementById("overlay").style.display = "none";
}

function updateEventStatus() {
    const img = document.getElementById("eventImage");
    const goText = document.getElementById("goStatusText");
    const pendingText = document.getElementById("pendingStatusText");
    const noGoText = document.getElementById("noGoStatusText");

    const now = new Date();
    const isEventDay = now.getDay() === SETTINGS.eventDay;
    const afterSwitch = now.getHours() >= SETTINGS.switchTime;

    hideStatusText();
    resetImageClasses();

    if (SETTINGS.overrideGo && isEventDay) {
        goText.style.display = "block";
        return;
    }

    if (isEventDay && afterSwitch) {
        img.classList.add("red-tint");
        noGoText.style.display = "block";
        return;
    }

    img.classList.add("grayscale");
    pendingText.style.display = "block";
}

function createCalendar() {
    const calendar = document.getElementById("calendar");
    calendar.innerHTML = "";

    const events = getEvents();

    const now = new Date();
    const today = new Date(
        now.getFullYear(),
        now.getMonth(),
        now.getDate()
    );

    const startDate = new Date(today);
    startDate.setDate(today.getDate() - today.getDay());

    for (let i = 0; i < 28; i++) {
        const date = new Date(startDate);
        date.setDate(startDate.getDate() + i);

        const key =
            String(date.getFullYear()).slice(2) +
            String(date.getMonth() + 1).padStart(2, "0") +
            String(date.getDate()).padStart(2, "0");

        const day = document.createElement("div");
        day.className = "day";
        day.innerHTML = `<strong>${date.getDate()}</strong>`;

        if (events[key]) {
            const event = events[key];

            day.classList.add("has-event");
            day.style.cursor = "pointer";

            day.addEventListener("click", () => {
                openPopup(`
                    <h3 id="popup-title">${date.toDateString()}</h3>
                    <p>${event.description}</p>
                    <p><strong>${event.startTime} - ${event.endTime}</strong></p>
                    <p>
                        <a href="https://www.google.com/maps?q=${event.location.lat},${event.location.lon}" target="_blank" rel="noopener noreferrer">
                            View Location
                        </a>
                    </p>
                `);
            });
        }

        calendar.appendChild(day);
    }
}

function initEventsPage() {
    updateEventStatus();
    createCalendar();
}

document.addEventListener("DOMContentLoaded", initEventsPage);
</script>

</body>
</html>
